<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advait Group — Internal Tools Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Calibri, 'Segoe UI', sans-serif; background: #EEF4F7; min-height: 100vh; }
    .header {
      background: #0D4F6C; padding: 20px 36px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 3px solid #2E86AB;
    }
    .header-meta { color: #A8D4E6; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 4px; }
    .header-title { color: #fff; font-size: 23px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .tool-count { color: #A8D4E6; font-size: 13px; }
    .btn-add {
      background: #2E86AB; color: #fff; border: none; padding: 10px 22px;
      border-radius: 4px; font-size: 14px; cursor: pointer;
      font-family: Calibri, sans-serif; font-weight: 600; transition: background 0.2s;
    }
    .btn-add:hover { background: #0D4F6C; }
    .controls {
      background: #fff; border-bottom: 1px solid #C5DCE8;
      padding: 13px 36px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    }
    .search-wrap { flex: 1; min-width: 200px; }
    .search-input {
      width: 100%; padding: 8px 14px; border: 1px solid #C8DDE8; border-radius: 4px;
      font-size: 14px; font-family: Calibri, sans-serif; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #2E86AB; }
    .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-btn {
      padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer;
      font-family: Calibri, sans-serif; border: 1px solid #C8DDE8; background: #fff; color: #1C1C1C; transition: all 0.15s;
    }
    .cat-btn:hover { border-color: #2E86AB; color: #2E86AB; }
    .cat-btn.active { background: #0D4F6C; color: #fff; border-color: #0D4F6C; }
    .grid {
      padding: 24px 36px;
      columns: 3 340px;
      column-gap: 18px;
    }
    .card-wrap {
      break-inside: avoid;
      margin-bottom: 18px;
      display: inline-block;
      width: 100%;
    }
    .card {
      background: #fff; border-radius: 6px; border: 1px solid #D8E9F0;
      overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(13,79,108,0.12); }
    .card-header {
      background: linear-gradient(135deg, #0D4F6C 0%, #2E86AB 100%);
      padding: 15px 18px; display: flex; align-items: flex-start; gap: 12px;
    }
    .card-icon-wrap {
      width: 40px; height: 40px; background: rgba(255,255,255,0.15);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .card-title { color: #fff; font-weight: 700; font-size: 15px; margin-bottom: 5px; line-height: 1.3; }
    .card-badge {
      display: inline-block; background: rgba(46,134,171,0.25); color: #E0F2FA;
      font-size: 10px; padding: 2px 9px; border-radius: 10px;
      font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
    }
    .card-body { padding: 15px 18px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .card-desc { color: #3A3A3A; font-size: 13px; line-height: 1.65; }
    .divider { height: 1px; background: #EEF2F8; }
    .link-label { font-size: 10px; color: #808080; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; font-weight: 600; }
    .link-row { display: flex; gap: 6px; align-items: center; }
    .link-box {
      flex: 1; min-width: 0; background: #F2F7FA; padding: 7px 10px; border-radius: 4px;
      font-size: 12px; color: #2A3A5A; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      border: 1px solid #D8E9F0; font-family: 'Consolas', 'Courier New', monospace;
    }
    .btn-copy {
      padding: 6px 11px; border: 1px solid #D0D8E8; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 12px; color: #808080;
      font-family: Calibri, sans-serif; white-space: nowrap; transition: all 0.2s;
    }
    .btn-copy:hover { border-color: #2E86AB; color: #2E86AB; }
    .btn-copy.copied { background: #EBF5EB; color: #1B6B2A; border-color: #7DC48A; }
    .btn-open {
      padding: 6px 12px; border: none; border-radius: 4px; background: #2E86AB;
      cursor: pointer; font-size: 12px; color: #fff;
      font-family: Calibri, sans-serif; white-space: nowrap; transition: background 0.2s;
    }
    .btn-open:hover { background: #0D4F6C; }
    .no-short { font-size: 11px; color: #BBBBBF; font-style: italic; }
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 24px; color: #9AA5B8; }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #6A7A94; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,30,60,0.55);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #fff; border-radius: 8px; padding: 30px;
      width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 12px 40px rgba(26,64,132,0.18);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .modal-title { color: #0D4F6C; font-size: 19px; font-weight: 700; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: #808080; line-height: 1; }
    .modal-close:hover { color: #0D4F6C; }
    .modal-field { margin-bottom: 14px; }
    .modal-label { font-size: 12px; color: #5A6070; margin-bottom: 5px; font-weight: 600; }
    .modal-input {
      width: 100%; padding: 9px 12px; border: 1px solid #C8DDE8; border-radius: 4px;
      font-size: 14px; font-family: Calibri, sans-serif; outline: none; transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: #2E86AB; }
    .modal-input.large { min-height: 70px; resize: vertical; }
    .modal-section { font-size: 11px; color: #2E86AB; text-transform: uppercase; letter-spacing: 1px;
      font-weight: 700; margin: 18px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #E4EBF5; }
    .modal-row { display: flex; gap: 12px; }
    .modal-row .modal-field { flex: 1; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 18px; border-top: 1px solid #EEF2F8; }
    .btn-cancel {
      padding: 9px 22px; border: 1px solid #C8DDE8; border-radius: 4px;
      background: #fff; cursor: pointer; font-family: Calibri, sans-serif; font-size: 14px; color: #5A6070;
    }
    .btn-cancel:hover { border-color: #808080; }
    .btn-save {
      padding: 9px 24px; border: none; border-radius: 4px; background: #0D4F6C;
      color: #fff; cursor: pointer; font-family: Calibri, sans-serif; font-size: 14px; font-weight: 600;
    }
    .btn-save:hover { background: #0a3b52; }
    .footer { text-align: center; padding: 20px; color: #9AA5B8; font-size: 12px; border-top: 1px solid #E4EBF5; margin-top: 8px; }

    .header-left { display: flex; align-items: center; gap: 20px; }
    .header-logos { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.97); border-radius: 6px; padding: 6px 14px; }
    .header-logo { height: 36px; width: auto; object-fit: contain; }
    .logo-divider { width: 1px; height: 28px; background: #C8DDE8; }
    @media (max-width: 640px) {
      .header, .controls, .grid { padding-left: 16px; padding-right: 16px; }
      .tool-count { display: none; }
      .header-logos { display: none; }
    }
  </style>
</head>

<script>
(function() {


  var HR_PASSWORD = "Advait@HR##2026";
  var hrSessionUnlocked = false;
  var hrPendingUrl = "";

  function openTool(id, url, cat) {
    if (cat === "HR" && !hrSessionUnlocked) {
      hrPendingUrl = url;
      document.getElementById("hrPwdInput").value = "";
      document.getElementById("hrPwdError").textContent = "";
      document.getElementById("hrModal").style.display="flex";
      setTimeout(function(){ document.getElementById("hrPwdInput").focus(); }, 100);
      return;
    }
    launchUrl(url);
  }

  function launchUrl(url) {
    if (url) {
      var a = document.createElement("a");
      a.href = url; a.target = "_blank";
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); }, 100);
    }
  }

  function checkHrPwd() {
    var entered = document.getElementById("hrPwdInput").value;
    if (entered === HR_PASSWORD) {
      hrSessionUnlocked = true;
      document.getElementById("hrPwdError").textContent = "";
      document.getElementById("hrPwdSuccess").style.display = "block";
      var pendingUrl = hrPendingUrl;
      setTimeout(function(){
        closeHrModal();
        document.getElementById("hrPwdSuccess").style.display = "none";
        launchUrl(pendingUrl);
        hrPendingUrl = "";
      }, 1200);
    } else {
      document.getElementById("hrPwdError").textContent = "Incorrect password. Please try again.";
      document.getElementById("hrPwdInput").value = "";
      document.getElementById("hrPwdInput").focus();
    }
  }

  function closeHrModal() {
    var el = document.getElementById("hrModal");
    if (el) el.style.display = "none";
    hrPendingUrl = "";
  }
  window.checkHrPwd = checkHrPwd;
  window.closeHrModal = closeHrModal;

  document.addEventListener("DOMContentLoaded", function(){
    var hrModalEl = document.getElementById("hrModal");

  var activeCategory = "All";

  function h(str) {
    return String(str || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function getCategories() {
    var seen = {}, out = [];
    tools.forEach(function(t){ if(t.category && !seen[t.category]){ seen[t.category]=1; out.push(t.category); }});
    return out;
  }

  function renderCatPills() {
    var cats = ["All"].concat(getCategories());
    document.getElementById("catPills").innerHTML = cats.map(function(cat){
      var cnt = cat === "All" ? "" : ' <span style="opacity:0.6;font-size:11px">('+tools.filter(function(t){return t.category===cat;}).length+')</span>';
      return '<button class="cat-btn'+(activeCategory===cat?' active':'')+'" data-cat="'+h(cat)+'">'+h(cat)+cnt+'</button>';
    }).join("");
  }

  document.getElementById("catPills").addEventListener("click", function(e){
    var b = e.target.closest(".cat-btn");
    if(b){ activeCategory = b.getAttribute("data-cat"); renderAll(); }
  });

  function renderCards() {
    var q = document.getElementById("searchInput").value.toLowerCase();
    var filtered = tools.filter(function(t){
      var mc = activeCategory === "All" || t.category === activeCategory;
      var ms = !q || t.title.toLowerCase().indexOf(q)!==-1 || (t.desc||"").toLowerCase().indexOf(q)!==-1 || (t.category||"").toLowerCase().indexOf(q)!==-1;
      return mc && ms;
    });
    document.getElementById("toolCountLabel").textContent = tools.length+" tool"+(tools.length!==1?"s":"");
    var grid = document.getElementById("toolGrid");
    if(!filtered.length){
      grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No tools found</div><p style="font-size:13px">Try a different search or category.</p></div>';
      return;
    }
    grid.innerHTML = filtered.map(function(tool){
      var descHtml = tool.desc ? '<div class="card-desc">'+h(tool.desc).replace(/\n/g,"<br>")+'</div>' : "";
      var shortBlock = tool.short
        ? '<div style="margin-top:8px"><div class="link-label">Short Link</div><div class="link-row"><div class="link-box">'+h(tool.short)+'</div><button class="btn-copy" data-copy="'+h(tool.short)+'">Copy</button><button class="btn-open" data-url="'+h(tool.short)+'">Open &#x2197;</button></div></div>'
        : '<div class="no-short" style="margin-top:4px">Short link not added yet</div>';
      return '<div class="card-wrap"><div class="card">'
        +'<div class="card-header">'
        +'<div class="card-icon-wrap">'+(tool.icon||"🔗")+'</div>'
        +'<div><div class="card-title">'+h(tool.title)+'</div>'
        +(tool.category?'<span class="card-badge">'+h(tool.category)+'</span>':'')
        +'</div></div>'
        +'<div class="card-body">'
        +descHtml
        +'<div class="divider"></div>'
        +(tool.url
          ? '<div class="link-label">Full Link</div>'
            +'<div class="link-row"><div class="link-box">'+h(tool.url)+'</div>'
            +'<button class="btn-copy" data-copy="'+h(tool.url)+'">Copy</button>'
            +'<button class="btn-open" data-url="'+h(tool.url)+'" data-id="'+tool.id+'" data-cat="'+h(tool.category||"")+'">Open &#x2197;</button>'
            +'</div>'
            +shortBlock
          : '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#FFF8ED;border:1px solid #F5D89A;border-radius:4px">'
            +'<span style="font-size:13px">⏳</span>'
            +'<span style="font-size:12px;color:#8A6200;font-style:italic">Link coming soon — check back shortly</span>'
            +'</div>'
        )
        +'</div></div></div>';
    }).join("");
  }

  document.getElementById("toolGrid").addEventListener("click", function(e){
    var copyBtn = e.target.closest(".btn-copy");
    var openBtn = e.target.closest(".btn-open");
    if(copyBtn){
      var txt = copyBtn.getAttribute("data-copy");
      if(!txt) return;
      if(navigator.clipboard){
        navigator.clipboard.writeText(txt).then(function(){ flash(copyBtn); }).catch(function(){ fallbackCopy(txt, copyBtn); });
      } else { fallbackCopy(txt, copyBtn); }
    }
    if(openBtn){
      var url = openBtn.getAttribute("data-url");
      var id = parseInt(openBtn.getAttribute("data-id"), 10);
      var cat = openBtn.getAttribute("data-cat") || "";
      openTool(id, url, cat);
    }
  });

  function flash(btn){
    btn.textContent = "✓ Copied"; btn.classList.add("copied");
    setTimeout(function(){ btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  }

  function fallbackCopy(text, btn){
    var ta = document.createElement("textarea");
    ta.value = text; ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); flash(btn); } catch(e){ alert("Copy failed. Please copy manually:\n"+text); }
    document.body.removeChild(ta);
  }

  function renderAll(){ renderCatPills(); renderCards(); }

  window.openModal = function(){
    ["f-title","f-category","f-desc","f-url","f-short"].forEach(function(id){ document.getElementById(id).value=""; });
    document.getElementById("f-icon").value = "🔗";
    document.getElementById("modalOverlay").classList.remove("hidden");
  };
  window.closeModal = function(){ document.getElementById("modalOverlay").classList.add("hidden"); };

  document.getElementById("modalOverlay").addEventListener("click", function(e){
    if(e.target === document.getElementById("modalOverlay")) closeModal();
  });

  window.saveTool = function(){
    var title = document.getElementById("f-title").value.trim();
    var url = document.getElementById("f-url").value.trim();
    if(!title||!url){ alert("Title and URL are required."); return; }
    tools.push({
      id: Date.now(),
      title: title,
      category: document.getElementById("f-category").value.trim(),
      icon: document.getElementById("f-icon").value.trim()||"🔗",
      desc: document.getElementById("f-desc").value.trim(),
      url: url,
      short: document.getElementById("f-short").value.trim()
    });
    closeModal(); renderAll();
  };

  renderAll();
})();
</script>
